<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Login</title>
</head>
<body>
    <!-- Navigasi LOGO -->
   <div class="wrapper">
    <nav class="nav">
        <div class="nav-logo">
            <img src="IMG/Navigation.png" alt="">
        </div>
    </nav>

<!-- AKHIR DARI NAVIGASI LOGO -->
<!-- FROM BOX -->
   <div class="form-box">

    <div class="login-container" id="login">
        <div class="top">
            <header><b>Masuk Ke Akun</b></header>
            <span>Yuk, Lanjutin belajarmu di VideoBelajar</span>
        </div>
       <form action="#" class="form-login" method="post">
            <div class="input-box">
                <label for="email">E-mail*</label>
                <input type="email" id="email" class="input-field" required/>
            </div>
            <div class="input-box">
                <label>Password*</label>
                <input type="password" class="input-field" required />
                <a href="#">Lupa Password?</a>
            </div>
            
            <div class="button-satu" >
                <a href="beranda.html" target="_blank">Masuk</a>
            </div>
            <div class="button-dua">
                <a href="reqister.html" target="_blank" class="daftar">Daftar</a>
            </div>
            <h5>atau</h5>
            <div class="button-google">
                <div class="google-container">
                <a href="www.google.com" target="_blank" class="daftar">
                    <img src="IMG/logos_google-icon.png" alt=""> Masuk dengan google
                </a>
            </div>
            </div>
        </form>
    </div>
   </div>
</div>

</html>
