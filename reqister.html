<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/register.css">
    <title>Register</title>
</head>
<body>
    <!-- Navigasi LOGO -->
   <div class="wrapper">
    <nav class="nav">
        <div class="nav-logo">
            <img src="IMG/Navigation.png" alt="">
        </div>
    </nav>

<!-- AKHIR DARI NAVIGASI LOGO -->
<!-- FROM BOX -->
   <div class="form-box">

    <div class="register" id="register">
        <div class="top">
            <header><b>Pendaftaran Akun</b></header>
            <span>Yuk, Daftarkan akunmu sekarang juga!</span>
        </div>
       <form action="#" class="form-register" method="post">
            <div class="input-box">
                <label for="nama">Nama Lengkap*</label>
                <input type="text" id=nama" class="input-field" required/>
            </div>
            <div class="input-box">
                <label for="email">E-mail*</label>
                <input type="email" id=email" class="input-field" required/>
            </div>
            <div class="input-box">
                <label for="phone">Nomor Hp*</label>
                <input type="telp" id=phone" class="input-field" required/>
            </div>
            <div class="input-box">
                <label>Kata Sandi*</label>
                <input type="password" class="input-field" required />
            </div>
            <div class="input-box">
                <label>Konfirmasi Kata Sandi*</label>
                <input type="password" class="input-field" required />
            </div>
            
            <div class="button-satu" >
                <a href="www.google.com" target="_blank">Daftar</a>
            </div>
            <div class="button-dua">
                <a href="www.google.com" target="_blank" class="daftar">Masuk</a>
            </div>
            <h5>atau</h5>
            <div class="button-google">
                <div class="google-container">
                <a href="www.google.com" target="_blank" class="daftar">
                    <img src="IMG/logos_google-icon.png" alt=""> Masuk dengan google
                </a>
            </div>
            </div>
        </form>
    </div>
   </div>
</div>

</body>
</html>
